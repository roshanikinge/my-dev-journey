<!DOCTYPE html>
<html>
<head>
    <title>Day 29: Fetch API and AJAX</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        button { margin: 5px; padding: 5px 10px; }
        pre { background: #f4f4f4; padding: 10px; overflow-x: auto; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Fetch API Demo</h1>
    <button id="getBtn">GET Sample Post</button>
    <button id="postBtn">POST Example</button>
    <button id="errorBtn">Trigger Error</button>
    <h3>Response:</h3>
    <pre id="output">Click a button</pre>

    <script>
        // Day 29: AJAX / Fetch API

        const output = document.getElementById("output");

        async function fetchGet() {
            output.innerText = "Loading...";
            try {
                let response = await fetch("https://jsonplaceholder.typicode.com/posts/1");
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                let data = await response.json();
                output.innerText = JSON.stringify(data, null, 2);
                console.log("GET success:", data);
            } catch (error) {
                output.innerText = "Error: " + error.message;
                console.error("GET error:", error);
            }
        }

        async function fetchPost() {
            output.innerText = "Sending POST...";
            try {
                let response = await fetch("https://jsonplaceholder.typicode.com/posts", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        title: "Test Post",
                        body: "This is a test",
                        userId: 1
                    })
                });
                let data = await response.json();
                output.innerText = JSON.stringify(data, null, 2);
                console.log("POST response:", data);
            } catch (error) {
                output.innerText = "Error: " + error.message;
            }
        }

        async function fetchError() {
            output.innerText = "Trying invalid URL...";
            try {
                let response = await fetch("https://invalid.url.example");
                let data = await response.json();
                output.innerText = JSON.stringify(data);
            } catch (error) {
                output.innerText = "Caught error: " + error.message;
                console.log("Error handled:", error.message);
            }
        }

        document.getElementById("getBtn").addEventListener("click", fetchGet);
        document.getElementById("postBtn").addEventListener("click", fetchPost);
        document.getElementById("errorBtn").addEventListener("click", fetchError);

        console.log("Day 29 ready - use buttons to test fetch");
    </script>
</body>
</html>
